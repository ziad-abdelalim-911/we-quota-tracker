name: Daily Quota Tracker

on:
  schedule:
    - cron: '0 19 * * *'    # Runs every day at 9 PM Egypt time (may be 10 PM in summer)
  workflow_dispatch:        # Allow manual runs

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quota tracker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LND_NUMBER: ${{ secrets.LND_NUMBER }}
          LND_PASS: ${{ secrets.LND_PASS }}
          START_GB: ${{ secrets.START_GB }}
        run: python main.py
